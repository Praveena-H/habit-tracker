<!DOCTYPE html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Productivity Dashboard</h1>
        <p id="motivational-msg">Choose your habits and track your streak!</p>
    </header>

    <!-- Habit Selection Modal -->
    <div id="habit-selection" class="modal">
        <h2>Select 3 Habits to Track</h2>
        <div class="habit-options">
            <!-- Habit buttons will be generated by JS -->
        </div>
        <button id="save-habits">Start Tracking</button>
    </div>

    <!-- Dashboard -->
    <main id="dashboard">
        <!-- Habit cards will be dynamically generated -->
    </main>

    <!-- Weekly Summary -->
    <section id="weekly-summary">
        <h2>Weekly Summary</h2>
        <canvas id="weeklyChart"></canvas>
    </section>


    <script src="script.js"></script>
</body>
</html>
